<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bugatti | Create the Incomparable</title>
    
    <link rel="icon" type="image/png" size="24x24" href="logo bugatti.png">

    <style>

        @font-face {
            font-family: 'minha-fonte';
            src: url('fonte/darlington demo.otf') format("opentype");
            font-display: swap;
        }


        :root {
            --bugatti-blue: #004CFA;
            --deep-black: #050505;
            --text-gray: #a1a1a1;
            --white: #ffffff;
        }


        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }


        @keyframes navSlideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes navSlideUp {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-100%);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(-100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes zoom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 76, 250, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(0, 76, 250, 0.6)); }
        }

        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 0 0 10px rgba(0, 76, 250, 0.3);
            }
            50% {
                text-shadow: 0 0 20px rgba(0, 76, 250, 0.6);
            }
        }

        @keyframes underlineGrow {
            from {
                width: 0;
                left: 50%;
                transform: translateX(-50%);
            }
            to {
                width: 100%;
                left: 0;
                transform: translateX(0);
            }
        }


        body {
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                url('Chiron 1.jpg');
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            background-color: var(--deep-black);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--white);
            overflow-x: hidden;
            line-height: 1.6;
            animation: fadeIn 1s ease-out;
        }


        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.8);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            transition: all 0.4s ease;
            animation: navSlideDown 0.8s ease-out;
            box-shadow: 0 2px 20px rgba(0, 76, 250, 0.1);
        }

        nav:hover {
            box-shadow: 0 2px 30px rgba(0, 76, 250, 0.25);
        }

        nav.hide-nav {
            animation: navSlideUp 0.5s ease-in forwards;
        }


        .logo {
            font-weight: 700;
            font-size: 24px;
            letter-spacing: 5px;
            display: flex;
            align-items: center;
            animation: float 3s ease-in-out infinite, fadeIn 1s ease-out 0.7s both, pulse 3s ease-in-out infinite 2s, zoom 4s ease-in-out infinite 3s, glow 3s ease-in-out infinite 5s;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05);
            animation: glowPulse 0.6s ease-in-out infinite;
        }

        .logo img {
            width: 50px;
            height: auto;
            margin-right: 10px;
            transition: transform 0.3s ease;
            animation: fadeIn 1s ease-out 0.7s both, float 5s ease-in-out infinite 1s, pulse 3s ease-in-out infinite 2s, zoom 4s ease-in-out infinite 3s, glow 3s ease-in-out infinite 5s;
        }

        .logo:hover img {
            transform: rotate(5deg) scale(1.1);
        }


        .video-bg {
            filter: brightness(0.3);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            animation: fadeIn 2s ease-out, zoom 20s ease-in-out infinite 2s;
        }


        .menu a {
            color: var(--white);
            text-decoration: none;
            margin-left: 30px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            transition: all 0.3s ease;
            animation: fadeIn 1s ease-out;
            animation-fill-mode: both;
        }

        .menu a:nth-child(1) { animation-delay: 1s; }
        .menu a:nth-child(2) { animation-delay: 1.2s; }
        .menu a:nth-child(3) { animation-delay: 1.4s; }

        .menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--bugatti-blue), transparent);
            transition: width 0.4s ease;
        }

        .menu a:hover {
            color: var(--bugatti-blue);
        }

        .menu a:hover::after {
            width: 100%;
            animation: underlineGrow 0.4s ease-out;
        }


        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            animation: fadeIn 1.2s ease-out;
        }

        .hero p {
            letter-spacing: 5px;
            font-size: 14px;
            margin-bottom: 20px;
            text-transform: uppercase;
            animation: slideInLeft 0.8s ease-out 0.3s both;
        }

        .hero img {
            height: auto;
            width: 900px;
            margin-top: 50px;
            animation: fadeIn 1s ease-out 0.7s both, float 5s ease-in-out infinite 1s, pulse 3s ease-in-out infinite 2s, zoom 4s ease-in-out infinite 3s, glow 3s ease-in-out infinite 5s;
            image-resolution: 2560x1440;
        }

        .cta-button {
            padding: 18px 45px;
            border: 1px solid var(--white);
            background: transparent;
            color: var(--white);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 50px;
            margin-top: 100px;
            animation: slideInRight 0.8s ease-out 0.9s both;
        }

        .cta-button:hover {
            background: var(--white);
            color: var(--deep-black);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }


        .specs {
            padding: 150px 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
            gap: 80px;
            animation: fadeIn 1s ease-out;
        }

        .spec-item {
            flex: 1;
            min-width: 250px;
            text-align: center;
            animation: slideInUp 0.8s ease-out;
            animation-fill-mode: both;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .spec-item:nth-child(1) { animation: slideInLeft 0.8s ease-out 0.2s both; }
        .spec-item:nth-child(2) { animation: fadeIn 0.8s ease-out 0.4s both; }
        .spec-item:nth-child(3) { animation: slideInRight 0.8s ease-out 0.6s both; }

        .spec-item:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 76, 250, 0.3);
            box-shadow: 0 10px 30px rgba(0, 76, 250, 0.2);
        }

        .spec-item h2 {
            color: var(--bugatti-blue);
            font-size: clamp(50px, 8vw, 80px);
            font-weight: 300;
            margin-bottom: 10px;
            transition: all 0.3s ease;
            animation: glow 3s ease-in-out infinite;
        }

        .spec-item:hover h2 {
            color: var(--white);
            text-shadow: 0 0 20px rgba(0, 76, 250, 0.8);
            transform: scale(1.05);
        }

        .spec-item p {
            color: var(--text-gray);
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        .spec-item:hover p {
            color: var(--white);
        }


        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .menu { display: none; }
            .specs { gap: 40px; padding: 80px 20px; }
        }
    </style>
</head>
<body>

    <nav id="mainNav">
        <div class="logo"><img src="bugatti-brand-logo-white-vector-45972537-Photoroom (1).png" alt="BUGATTI" class="Logo-img">BUGATTI</div>
        <div class="menu">
            <a href="modelos.html">Modelos</a>
            <a href="lifestyle.html">Lifestyle</a>
            <a href="#specs">Performance</a>
        </div>
    </nav>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="Bugatti-Chiron-Edit-2-4K.mp4" type="video/mp4">
</video>

    <section class="hero">
        <p>A quintessência da performance</p>
        <img src="logo chiron.png" alt="assinatura bugatti chiron">
    <a href="testemunhe a lenda.html" style="text-decoration: none;">
        <button class="cta-button">Testemunhe a lenda</button>
    </a>
    </section>

    <section class="specs" id="specs">

        <div class="spec-item">
            <h2><span class="counter" data-target="1500">0</span></h2>
            <p>Potência Máxima (HP)</p>
        </div>

        <div class="spec-item">
            <h2><span class="counter" data-target="420">0</span></h2>
            <p>Velocidade Final (KM/H)</p>
        </div>

        <div class="spec-item">
            <h2><span class="counter" data-target="2.4" data-decimals="1">0</span></h2>
            <p>0-100 KM/H (S)</p>
        </div>

    </section>

    <script>
        const nav = document.getElementById('mainNav');
        let lastScrollTop = 0;
        let isNavHidden = false;

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;

            nav.style.background = window.scrollY > 50 ? "rgba(5, 5, 5, 0.95)" : "rgba(0, 0, 0, 0.8)";
            nav.style.padding = window.scrollY > 50 ? "15px 50px" : "20px 50px";

            if (scrollTop > lastScrollTop && scrollTop > 100) {

                if (!isNavHidden) {
                    nav.classList.remove('show-nav');
                    nav.classList.add('hide-nav');
                    isNavHidden = true;
                }
            } else {

                if (isNavHidden) {
                    nav.classList.remove('hide-nav');
                    nav.classList.add('show-nav');
                    isNavHidden = false;
                }
            }

            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
        });


        const startCounter = (el) => {
            const target = parseFloat(el.getAttribute('data-target'));
            const decimals = parseInt(el.getAttribute('data-decimals')) || 0;
            let current = 0;
            const step = target / 100;

            const update = () => {
                current += step;
                if (current < target) {
                    el.innerText = current.toFixed(decimals);
                    requestAnimationFrame(update);
                } else {
                    el.innerText = target.toFixed(decimals);
                }
            };
            update();
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.querySelectorAll('.counter').forEach(startCounter);
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.5 });

        observer.observe(document.querySelector('.specs'));
    </script>
</body>
</html>
